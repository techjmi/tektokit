<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle animation -->
  <circle cx="100" cy="100" r="80" stroke="url(#gradient)" stroke-width="2" fill="none" opacity="0.3">
    <animate attributeName="r" values="75;85;75" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Main logo shape - Abstract T -->
  <g transform="translate(100, 100)">
    <!-- Vertical bar -->
    <rect x="-8" y="-40" width="16" height="80" fill="url(#gradient)" rx="4">
      <animate attributeName="height" values="70;80;70" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="-35;-40;-35" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Horizontal bar -->
    <rect x="-35" y="-40" width="70" height="16" fill="url(#gradient2)" rx="4">
      <animate attributeName="width" values="60;70;60" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="-30;-35;-30" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    
    <!-- Decorative dots -->
    <circle cx="-45" cy="-32" r="4" fill="url(#gradient3)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="45" cy="-32" r="4" fill="url(#gradient3)">
      <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
